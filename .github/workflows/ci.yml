name: CI

on:
  pull_request:
    types: [edited, opened, reopened, synchronize]
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Test documentation policy
        run: |
          ./scripts/test-documentation-change-policy.sh
          ./scripts/test-documentation-check.sh

      - name: Validate documentation structure
        run: |
          ./scripts/check-documentation.sh

      - name: Classify documentation change
        id: documentation-change
        env:
          EVENT_ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPOSITORY: ${{ github.repository }}
        run: |
          policy="$(
            ./scripts/classify-documentation-change.sh \
              "$EVENT_NAME" \
              "$EVENT_ACTOR" \
              "$PR_AUTHOR" \
              "$HEAD_REPOSITORY" \
              "$REPOSITORY" \
              "$HEAD_REF"
          )"

          case "$policy" in
            skip|validate) ;;
            *) exit 1 ;;
          esac

          printf 'policy=%s\n' "$policy" >> "$GITHUB_OUTPUT"

      - name: Validate documentation change
        if: ${{ github.event_name == 'pull_request' && steps.documentation-change.outputs.policy == 'validate' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          body_file="$RUNNER_TEMP/pull-request-body.md"
          printf '%s\n' "$PR_BODY" > "$body_file"
          ./scripts/check-documentation.sh "$BASE_SHA" "$HEAD_SHA" "$body_file"

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          toolchain: 1.95.0
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings -F missing-docs -F unsafe-code

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings -F missing-docs -F unsafe-code
        run: cargo doc --workspace --all-features --no-deps --locked

  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: macOS
            os: macos-latest
          - name: Windows
            os: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          toolchain: 1.95.0

      - name: Run tests
        run: cargo test --workspace --all-features --locked
