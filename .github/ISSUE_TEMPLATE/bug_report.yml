name: Bug report
description: Report a reproducible defect.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Follow SECURITY.md instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable reproduction.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the revision, operating system, and relevant tool versions.
    validations:
      required: true
